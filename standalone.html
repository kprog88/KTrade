<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AntiGravity Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-color: #0d0e15;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.5);
      --success-color: #10b981;
      --danger-color: #ef4444;
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --glass-blur: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; top: -20%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%); z-index: -1; border-radius: 50%; }
    body::after { content: ''; position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, rgba(0,0,0,0) 70%); z-index: -1; border-radius: 50%; }

    .app-container { display: flex; min-height: 100vh; width: 100%; }
    .sidebar { width: 250px; height: 100vh; position: sticky; top: 0; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 2rem; border-right: 1px solid var(--panel-border); background: rgba(13, 14, 21, 0.6); backdrop-filter: blur(20px); }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
    .logo span { color: var(--accent-color); }
    .nav-links { display: flex; flex-direction: column; gap: 1rem; }
    .nav-item { padding: 0.75rem 1rem; border-radius: 8px; color: var(--text-secondary); text-decoration: none; transition: all 0.2s ease; font-weight: 500; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: rgba(139, 92, 246, 0.1); color: var(--accent-color); }

    .main-content { flex: 1; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-color), #3b82f6); }
    
    .glass-panel { background: var(--panel-bg); backdrop-filter: blur(var(--glass-blur)); border: 1px solid var(--panel-border); border-radius: 16px; box-shadow: var(--glass-shadow); padding: 1.5rem; transition: transform 0.3s ease; }
    .glass-panel:hover { transform: translateY(-2px); box-shadow: 0 12px 40px 0 rgba(0,0,0,0.4); }
    
    .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
    .portfolio-overview { grid-column: span 12; display: flex; justify-content: space-between; background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(13,14,21,0) 100%); border-left: 4px solid var(--accent-color); }
    .metric-label { font-size: 0.875rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
    .trend-positive { color: var(--success-color); font-size: 1rem; font-weight: 500; }
    .trend-negative { color: var(--danger-color); font-size: 1rem; font-weight: 500; }
    
    .holdings-panel { grid-column: span 8; min-height: 300px; }
    .ai-panel { grid-column: span 4; min-height: 300px; background: linear-gradient(180deg, rgba(16,185,129,0.05) 0%, rgba(13,14,21,0) 100%); border-top: 2px solid var(--success-color); }
    .chart-placeholder { width: 100%; height: 200px; margin-top: 1rem; background: linear-gradient(90deg, transparent, rgba(139,92,246,0.1), transparent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); animation: pulse 2s infinite ease-in-out; }
    
    .btn-primary { background: var(--accent-color); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .form-input { background: rgba(13,14,21,0.5); border: 1px solid var(--panel-border); color: white; padding: 0.75rem; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 1rem; color: var(--text-secondary); border-bottom: 1px solid var(--panel-border); }
    td { padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .asset-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; background: rgba(139,92,246,0.2); color: #a78bfa; margin-right: 1rem; }
    
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 0.8; } 100% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function Dashboard() {
      return (
        <div className="dashboard-grid">
          <div className="glass-panel portfolio-overview">
            <div>
              <div className="metric-label">Total Balance</div>
              <div className="metric-value">$45,231.89</div>
            </div>
            <div>
              <div className="metric-label">24h Profit</div>
              <div className="metric-value trend-positive">+$1,245.00 (2.8%) ▲</div>
            </div>
          </div>
          <div className="glass-panel holdings-panel">
            <h2>Performance Chart</h2>
            <div className="chart-placeholder">Live Chart Rendering...</div>
          </div>
          <div className="glass-panel ai-panel">
            <h2>AI Insights ✦</h2>
            <p style={{marginTop: '1rem', color: '#94a3b8'}}><strong style={{color: 'white'}}>Analysis:</strong> Your portfolio is heavily weighted in Tech (60%). The recent momentum in semiconductor stocks has driven your 24h profit.</p>
            <p style={{marginTop: '1rem', color: '#94a3b8'}}><strong style={{color: '#10b981'}}>Recommendation:</strong> Consider setting a trailing stop-loss for AAPL to lock in profits.</p>
          </div>
        </div>
      );
    }

    function Portfolio() {
      const [showAdd, setShowAdd] = useState(false);
      return (
        <div style={{display: 'flex', flexDirection: 'column', gap: '1.5rem'}}>
          <div style={{display: 'flex', justifyContent: 'space-between'}}>
            <h2>Your Holdings</h2>
            <button className="btn-primary" onClick={() => setShowAdd(!showAdd)}>+ Add Asset</button>
          </div>
          
          {showAdd && (
            <div className="glass-panel" style={{display: 'flex', gap: '1rem', alignItems: 'flex-end'}}>
              <div style={{flex: 1}}>
                <label className="metric-label">Asset</label><br/>
                <input className="form-input" style={{width: '100%', marginTop: '0.5rem'}} placeholder="AAPL"/>
              </div>
              <div style={{flex: 1}}>
                <label className="metric-label">Amount</label><br/>
                <input type="number" className="form-input" style={{width: '100%', marginTop: '0.5rem'}} placeholder="0.00"/>
              </div>
              <button className="btn-primary">Save Asset</button>
            </div>
          )}

          <div className="glass-panel">
            <table>
              <thead><tr><th>Asset</th><th>Holding</th><th>Total Value</th><th>P/L</th></tr></thead>
              <tbody>
                <tr>
                  <td style={{display: 'flex', alignItems: 'center'}}><div className="asset-icon">A</div> <strong>AAPL</strong></td>
                  <td>150.00 <div style={{fontSize: '0.875rem', color: '#94a3b8'}}>$145.20 avg</div></td>
                  <td>$26,025.00</td>
                  <td className="trend-positive">+$4,245.00</td>
                </tr>
                <tr>
                  <td style={{display: 'flex', alignItems: 'center'}}><div className="asset-icon" style={{background: 'rgba(16,185,129,0.2)', color: '#34d399'}}>N</div> <strong>NVDA</strong></td>
                  <td>40.00 <div style={{fontSize: '0.875rem', color: '#94a3b8'}}>$350.00 avg</div></td>
                  <td>$16,408.00</td>
                  <td className="trend-positive">+$2,408.00</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function Watchlist() {
      return (
        <div style={{display: 'flex', flexDirection: 'column', gap: '1.5rem'}}>
          <h2>Your Watchlist</h2>
          <div className="dashboard-grid">
            <div className="glass-panel" style={{gridColumn: 'span 4'}}>
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                <div style={{display: 'flex', alignItems: 'center'}}><div className="asset-icon" style={{background: 'rgba(59,130,246,0.2)', color: '#60a5fa'}}>T</div> <strong>TSLA</strong></div>
                <div style={{textAlign: 'right'}}><strong>$214.50</strong><div className="trend-negative" style={{fontSize: '0.75rem'}}>- $4.20 (▼)</div></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');

      return (
        <div className="app-container">
          <aside className="sidebar">
            <div className="logo">✦ <span>AntiGravity</span></div>
            <nav className="nav-links">
              <a className={`nav-item ${activeTab==='dashboard'?'active':''}`} onClick={()=>setActiveTab('dashboard')}>Dashboard</a>
              <a className={`nav-item ${activeTab==='portfolio'?'active':''}`} onClick={()=>setActiveTab('portfolio')}>Portfolio</a>
              <a className={`nav-item ${activeTab==='watchlist'?'active':''}`} onClick={()=>setActiveTab('watchlist')}>Watchlist</a>
            </nav>
          </aside>
          <main className="main-content">
            <header className="header">
              <h1>Overview</h1>
              <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                <span style={{color: 'var(--text-secondary)'}}>Welcome back</span>
                <div className="avatar"></div>
              </div>
            </header>
            
            {activeTab === 'dashboard' && <Dashboard />}
            {activeTab === 'portfolio' && <Portfolio />}
            {activeTab === 'watchlist' && <Watchlist />}
            
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
